<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ - Практика</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .filter-bar select {
            width: auto;
            flex: 1;
        }
        .filter-bar button {
            padding: 10px 16px;
            white-space: nowrap;
        }
        .student-row {
            background: var(--secondary-bg);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        .student-row:hover { opacity: 0.8; }
        .student-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .student-name { font-weight: 600; }
        .student-group { color: var(--hint); font-size: 13px; }
        .status-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-registered { background: #555; }
        .status-step_1 { background: #e65100; }
        .status-step_2 { background: #f9a825; color: #000; }
        .status-step_3 { background: #2196f3; }
        .status-submitted { background: #4caf50; }
        .student-detail { margin-top: 8px; display: none; }
        .student-detail.open { display: block; }
        .detail-step { margin-bottom: 12px; }
        .detail-step h4 { font-size: 14px; color: var(--link); margin-bottom: 4px; }
        .detail-answer { font-size: 13px; color: var(--hint); margin: 2px 0; }
        .detail-answer strong { color: var(--text); }
        .empty-state { text-align: center; color: var(--hint); padding: 40px 0; }
        .count-badge { color: var(--hint); font-size: 14px; }
    </style>
</head>
<body>
    <div class="admin-header">
        <h1>Результаты</h1>
        <span class="count-badge" id="count"></span>
    </div>

    <div class="tab-bar" style="display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid var(--secondary-bg)">
        <button class="tab-btn active" data-tab="practice" style="flex:1;padding:10px;background:none;border:none;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid var(--btn-bg);margin-bottom:-2px">Практика</button>
        <button class="tab-btn" data-tab="express" style="flex:1;padding:10px;background:none;border:none;color:var(--hint);font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px">На пару</button>
        <button class="tab-btn" data-tab="quiz" style="flex:1;padding:10px;background:none;border:none;color:var(--hint);font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px">Тест</button>
    </div>

    <div id="tab-practice">
        <div class="filter-bar">
            <select id="group-filter">
                <option value="">Все группы</option>
                <option value="МДК01">МДК01</option>
                <option value="МДК02">МДК02</option>
                <option value="МДК03">МДК03</option>
                <option value="МДК04">МДК04</option>
            </select>
            <button class="btn-secondary" id="btn-export">CSV</button>
        </div>
        <div id="students-list"></div>
        <div id="empty-state" class="empty-state hidden">Пока нет студентов</div>
    </div>

    <div id="tab-express" class="hidden">
        <div class="filter-bar">
            <select id="express-group-filter">
                <option value="">Все группы</option>
                <option value="МДК01">МДК01</option>
                <option value="МДК02">МДК02</option>
                <option value="МДК03">МДК03</option>
                <option value="МДК04">МДК04</option>
            </select>
            <button class="btn-secondary" id="btn-express-export">CSV</button>
        </div>
        <div id="express-students-list"></div>
        <div id="express-empty-state" class="empty-state hidden">Пока никто не делал «Практику на пару»</div>
    </div>

    <div id="tab-quiz" class="hidden">
        <div class="filter-bar">
            <select id="quiz-group-filter">
                <option value="">Все группы</option>
                <option value="МДК01">МДК01</option>
                <option value="МДК02">МДК02</option>
                <option value="МДК03">МДК03</option>
                <option value="МДК04">МДК04</option>
            </select>
            <button class="btn-secondary" id="btn-quiz-export">CSV</button>
        </div>
        <div id="quiz-students-list"></div>
        <div id="quiz-empty-state" class="empty-state hidden">Пока никто не прошёл тест</div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
